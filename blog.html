    <style>
        /* ===== CSS 리셋 & 변수 ===== */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f;
            --text: #e0e0e0;
            --accent: #ff0055;
            --accent2: #00ffc8;
            --border: #2a2a3a;
            --card-bg: #12121a;
            --font-mono: 'Courier New', Courier, monospace;
            --font-sans: 'Inter', 'Segoe UI', Roboto, sans-serif;
            --brutal-shadow: 6px 6px 0 #000;
            --brutal-shadow-hover: 3px 3px 0 #000;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: var(--font-mono);
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            padding: 0;
            margin: 0;
            font-size: 16px;
        }
        /* ===== 글로벌 타이포그래피 ===== */
        h1, h2, h3, h4 { font-family: var(--font-sans); font-weight: 800; text-transform: uppercase; letter-spacing: -0.02em; color: var(--accent2); }
        h1 { font-size: 3rem; line-height: 1.1; margin-bottom: 1rem; border-bottom: 4px solid var(--accent); display: inline-block; }
        h2 { font-size: 2.2rem; margin: 2rem 0 1rem; border-left: 6px solid var(--accent); padding-left: 1rem; }
        h3 { font-size: 1.6rem; margin: 1.5rem 0 0.8rem; }
        p, li { font-size: 1.05rem; margin-bottom: 1rem; }
        a { color: var(--accent2); text-decoration: underline; text-underline-offset: 2px; transition: all 0.2s; }
        a:hover { color: var(--accent); background: rgba(255,0,85,0.1); }
        strong { color: var(--accent); font-weight: 700; }
        /* ===== 버튼 & 유틸 ===== */
        .btn-raw {
            display: inline-block;
            background: var(--accent);
            color: #000 !important;
            text-decoration: none;
            padding: 0.8rem 2rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 2px solid #000;
            box-shadow: var(--brutal-shadow);
            transition: all 0.15s;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.05em;
        }
        .btn-raw:hover {
            box-shadow: var(--brutal-shadow-hover);
            transform: translate(3px, 3px);
            background: #000;
            color: var(--accent2) !important;
            border-color: var(--accent2);
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }
        .card {
            background: var(--card-bg);
            border: 2px solid var(--border);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: var(--brutal-shadow);
        }
        /* 네비게이션 */
        nav {
            background: #000;
            border-bottom: 3px solid var(--accent);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        nav .logo a {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--accent2);
            text-decoration: none;
            text-transform: uppercase;
        }
        nav .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }
        nav .nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.3rem 0;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }
        nav .nav-links a:hover, nav .nav-links a.active {
            border-bottom-color: var(--accent);
            color: var(--accent2);
        }
        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            background: none;
            border: none;
            padding: 5px;
        }
        .hamburger span {
            width: 28px;
            height: 3px;
            background: var(--accent2);
            display: block;
            transition: 0.3s;
        }
        /* 반응형 */
        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            h2 { font-size: 1.6rem; }
            .container { padding: 1rem; }
            nav { flex-wrap: wrap; }
            .hamburger { display: flex; }
            nav .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                gap: 1rem;
                padding: 1rem 0;
                border-top: 2px solid var(--accent);
                margin-top: 0.5rem;
            }
            nav .nav-links.open { display: flex; }
            .card { padding: 1.2rem; }
        }
        /* 푸터 */
        footer {
            border-top: 3px solid var(--accent);
            padding: 2rem 1.5rem;
            text-align: center;
            color: #888;
            font-size: 0.9rem;
            margin-top: 3rem;
        }
        footer a { color: var(--accent2); }
        .blog-meta { font-size: 0.9rem; color: #999; margin-bottom: 1.5rem; }
        .blog-meta span { margin-right: 1.5rem; }
        blockquote {
            border-left: 4px solid var(--accent);
            padding-left: 1.2rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: #ccc;
        }
        .faq-item { border-bottom: 1px solid var(--border); padding: 1rem 0; }
        .faq-item h4 { font-size: 1.1rem; margin-bottom: 0.5rem; cursor: pointer; }
        .faq-item h4::before { content: "▶ "; color: var(--accent); }
    </style>
</head>
